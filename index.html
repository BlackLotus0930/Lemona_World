<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemona - The First Playable Agent OS</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo/lemona_pixel_logo.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Nunito:wght@600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-dark: #f4f5f7;
        --panel-bg: #ffffff;
        --border: rgba(0, 0, 0, 0.18);
        --text-main: rgba(0, 0, 0, 0.9);
        --text-muted: rgba(0, 0, 0, 0.55);
        --font-pixel: 'Press Start 2P', cursive;
        --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Mono', 'Consolas', monospace;
        --font-display: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: var(--font-mono);
        background: var(--bg-dark);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* Navbar */
      header {
        padding: 6px 20px;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        min-height: 40px;
      }

      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--text-main);
        line-height: 1;
      }

      .navbar-brand:hover {
        color: var(--text-main);
      }

      .navbar-brand .hero-logo {
        width: 24px;
        height: 24px;
        object-fit: contain;
        display: block;
      }

      .navbar-brand .brand-text {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 700;
        line-height: 1;
      }

      .navbar-actions {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .navbar-links {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      #auth-container {
        display: flex;
        align-items: center;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 28px;
        padding: 0 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 500;
        line-height: 1;
        color: var(--text-muted);
        text-decoration: none;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: color 0.15s ease, background 0.15s ease;
      }

      .nav-link:hover {
        color: var(--text-main);
        background: rgba(0, 0, 0, 0.04);
      }

      .nav-link img {
        width: 16px;
        height: 16px;
        object-fit: contain;
        display: block;
      }

      .nav-link img.nav-icon-doc {
        width: 12px;
        height: 12px;
      }

      .nav-link img.nav-icon-github {
        width: 19px;
        height: 19px;
      }

      .nav-link:has(.nav-icon-github) {
        gap: 4px;
      }

      .btn-sign-in {
        padding: 6px 14px;
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        color: white;
        background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-sign-in:hover {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }

      .nav-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: white;
        overflow: hidden;
        padding: 0;
        transition: none;
      }

      .nav-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .nav-avatar-menu {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        min-width: 160px;
        background: var(--panel-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        padding: 6px;
        z-index: 100;
      }

      .nav-avatar-menu-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-main);
        background: none;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
        text-decoration: none;
        transition: background 0.15s ease;
      }

      .nav-avatar-menu-item:hover {
        background: rgba(0, 0, 0, 0.05);
      }

      .nav-avatar-wrap {
        position: relative;
      }

      /* Workspace Layout */
      .workspace {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Sidebars */
      .sidebar {
        width: 225px;
        background: var(--panel-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .sidebar.right {
        border-right: none;
        border-left: 1px solid var(--border);
        width: 430px;
      }

      .sidebar:not(.right) .panel-header {
        padding: 10px 14px 10px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
      }

      .right-panel-header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }

      .right-panel-title {
        font-family: var(--font-display);
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        color: var(--text-main);
        margin-bottom: 4px;
      }

      .right-panel-subtitle {
        font-size: 11px;
        line-height: 1.4;
        color: var(--text-muted);
        margin-bottom: 10px;
      }

      .stream-switch {
        display: flex;
        gap: 0;
        background: rgba(0, 0, 0, 0.04);
        border-radius: 6px;
        padding: 2px;
      }

      .stream-tab {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1;
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.15s ease;
      }

      .stream-tab:hover {
        color: var(--text-main);
      }

      .stream-tab.active {
        background: white;
        color: var(--text-main);
        font-weight: 600;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }

      .panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
      }

      .sidebar:not(.right) .panel-content {
        padding: 10px 6px 10px 10px;
      }

      .sidebar:not(.right) .panel-content,
      .character-detail-content {
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 0, 0, 0.22) transparent;
      }

      .sidebar:not(.right) .panel-content::-webkit-scrollbar,
      .character-detail-content::-webkit-scrollbar {
        width: 6px;
      }

      .sidebar:not(.right) .panel-content::-webkit-scrollbar-track,
      .character-detail-content::-webkit-scrollbar-track {
        background: transparent;
      }

      .sidebar:not(.right) .panel-content::-webkit-scrollbar-thumb,
      .character-detail-content::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 999px;
      }

      .sidebar:not(.right) .panel-content::-webkit-scrollbar-thumb:hover,
      .character-detail-content::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }

      /* Game Container */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #000;
        overflow: hidden;
        position: relative;
        margin-top: -8px;
      }

      #game-container {
        flex: 1;
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      #game-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
      }

      /* Agent Cards */
      .agent-card {
        padding: 6px 2px;
        border: none;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: transparent;
        border-radius: 0;
      }

      .agent-avatar {
        width: 32px;
        height: 32px;
        background: rgba(0, 0, 0, 0.07);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--text-main);
        border-radius: 50%;
        overflow: hidden;
      }

      .agent-info h3 {
        font-size: 13px;
        margin-bottom: 4px;
        color: var(--text-main);
      }

      .agent-status {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        background: rgba(0, 0, 0, 0.4);
      }

      .status-dot.busy { background: #e59e0b; }

      .agent-card {
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .agent-card:hover {
        background: rgba(0, 0, 0, 0.04);
      }

      /* Character Detail Panel */
      .character-detail {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;
      }

      .character-detail-header {
        flex-shrink: 0;
        margin-left: -10px;
        padding: 10px 14px 10px 10px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .character-detail-header-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        line-height: 1;
      }

      .character-detail-back {
        width: 24px;
        height: 24px;
        min-width: 24px;
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.03);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        padding: 0;
        transition: all 0.15s ease;
      }

      .character-detail-back svg { flex-shrink: 0; }
      .character-detail-back:hover { background: rgba(0, 0, 0, 0.1); color: var(--text-main); }

      .character-detail-content {
        flex: 1;
        overflow-y: auto;
        padding: 10px 8px 12px 10px;
      }

      /* ── Hero ───────────────────────────── */
      .cd-hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .cd-hero-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.06);
        overflow: hidden;
        position: relative;
        margin-bottom: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }

      .cd-hero-avatar img {
        width: 100%; height: 100%; object-fit: cover;
        position: absolute; inset: 0;
      }

      .cd-hero-avatar .avatar-fallback {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; font-weight: 600; color: var(--text-muted);
      }

      .cd-hero-status-dot {
        position: absolute;
        bottom: 2px; right: 2px;
        width: 12px; height: 12px;
        border-radius: 50%;
        border: 2px solid var(--panel-bg, #fff);
      }

      .cd-hero-name {
        font-family: var(--font-display);
        font-size: 17px;
        font-weight: 700;
        color: var(--text-main);
        margin: 0 0 2px;
      }

      .cd-hero-desc {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
        max-width: 200px;
      }

      .cd-hero-bio {
        font-size: 11px;
        color: var(--text-muted);
        font-style: italic;
        margin-top: 4px;
        max-width: 210px;
        line-height: 1.35;
      }

      /* ── Now strip ─────────────────────── */
      .cd-now {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.06);
      }

      .cd-now-row {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        color: var(--text-main);
      }

      .cd-now-icon {
        flex-shrink: 0;
        width: 16px;
        text-align: center;
        font-size: 12px;
      }

      .cd-now-dim {
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ── Thought bubble ────────────────── */
      .cd-thought {
        padding: 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.06);
      }

      .cd-thought-quote {
        font-size: 12px;
        font-style: italic;
        color: var(--text-main);
        background: rgba(0,0,0,0.025);
        border-radius: 10px;
        padding: 8px 12px;
        line-height: 1.45;
        position: relative;
      }

      .cd-thought-quote::before {
        content: '';
        position: absolute;
        left: 14px; bottom: -5px;
        width: 10px; height: 10px;
        background: rgba(0,0,0,0.025);
        border-radius: 50%;
      }

      /* ── Relationship bubbles ──────────── */
      .cd-section-mini {
        padding: 10px 0 6px;
        border-bottom: 1px solid rgba(0,0,0,0.06);
      }

      .cd-section-mini-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .cd-rel-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .cd-rel-bubble {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        width: 42px;
      }

      .cd-rel-ring {
        width: 36px; height: 36px;
        border-radius: 50%;
        border: 2.5px solid #ccc;
        overflow: hidden;
        position: relative;
        background: rgba(0,0,0,0.04);
      }

      .cd-rel-ring img {
        width: 100%; height: 100%; object-fit: cover;
        position: absolute; inset: 0;
      }

      .cd-rel-fallback {
        position: absolute; inset: 0;
        display: none;
        align-items: center; justify-content: center;
        font-size: 13px; font-weight: 600; color: var(--text-muted);
      }

      .cd-rel-name {
        font-size: 9px;
        color: var(--text-muted);
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 42px;
      }

      /* ── Fold / details ────────────────── */
      .cd-details-fold {
        margin-top: 8px;
      }

      .cd-details-toggle {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        padding: 6px 0;
        user-select: none;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .cd-details-toggle::-webkit-details-marker { display: none; }

      .cd-details-toggle::before {
        content: '▸';
        font-size: 10px;
        transition: transform 0.15s ease;
      }

      .cd-details-fold[open] > .cd-details-toggle::before {
        transform: rotate(90deg);
      }

      /* ── Existing detail sections (inside fold) ── */
      .character-detail-section {
        margin-top: 10px;
        margin-left: -10px;
        padding: 10px 0 0 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }

      .character-detail-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .character-detail-stat-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 0;
        font-size: 12px;
      }

      .character-detail-stat-label { color: var(--text-muted); }
      .character-detail-stat-value { font-weight: 500; color: var(--text-main); }

      .character-detail-relationship-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 2px;
        font-size: 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .character-detail-relationship-item:last-child { border-bottom: none; }
      .character-detail-relationship-name { color: var(--text-main); }

      .character-detail-relationship-value {
        font-weight: 500;
        min-width: 36px;
        text-align: right;
      }

      .character-detail-relationship-value.positive { color: #16a34a; }
      .character-detail-relationship-value.negative { color: #dc2626; }
      .character-detail-relationship-value.neutral { color: var(--text-muted); }

      .character-detail-memory-placeholder {
        font-size: 12px;
        color: var(--text-muted);
        padding: 2px 0 0;
      }

      /* Activity Log */
      .panel-content.log-panel {
        padding: 0;
        display: flex;
        flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 0, 0, 0.22) transparent;
      }

      .panel-content.log-panel::-webkit-scrollbar {
        width: 6px;
      }

      .panel-content.log-panel::-webkit-scrollbar-track {
        background: transparent;
      }

      .panel-content.log-panel::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 999px;
      }

      .panel-content.log-panel::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }

      .log-empty-state {
        padding: 20px 12px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .log-empty-state strong {
        color: var(--text-main);
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .log-entry {
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.5;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        color: var(--text-main);
        background: transparent;
        transition: background 0.15s ease;
      }

      .log-entry:hover {
        background: rgba(0, 0, 0, 0.03);
      }

      .log-entry:nth-child(even) {
        background: rgba(0, 0, 0, 0.02);
      }

      .log-entry:nth-child(even):hover {
        background: rgba(0, 0, 0, 0.04);
      }

      .log-entry span.agent {
        color: #2563eb;
        font-weight: 500;
      }

      .log-entry span.action {
        color: rgba(0, 0, 0, 0.8);
      }

      .log-entry [style*="color:#3b82f6"] {
        color: #059669 !important;
      }

      /* OpenClaw markdown content */
      .openclaw-md {
        margin-top: 4px;
        font-family: var(--font-sans, system-ui, sans-serif);
        font-size: 12.5px;
        line-height: 1.55;
        word-break: break-word;
      }
      .openclaw-md p {
        margin: 0 0 6px;
      }
      .openclaw-md p:last-child {
        margin-bottom: 0;
      }
      .openclaw-md h3, .openclaw-md h4, .openclaw-md h5 {
        margin: 10px 0 4px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-main);
      }
      .openclaw-md h3 { font-size: 14px; }
      .openclaw-md h4 { font-size: 13px; }
      .openclaw-md strong {
        font-weight: 600;
      }
      .openclaw-md em {
        font-style: italic;
      }
      .openclaw-md code {
        background: rgba(0,0,0,0.06);
        padding: 1px 4px;
        border-radius: 3px;
        font-family: var(--font-mono);
        font-size: 11.5px;
      }
      .openclaw-md pre {
        background: rgba(0,0,0,0.05);
        border-radius: 5px;
        padding: 8px 10px;
        margin: 6px 0;
        overflow-x: auto;
      }
      .openclaw-md pre code {
        background: none;
        padding: 0;
        font-size: 11px;
        line-height: 1.5;
      }
      .openclaw-md ul, .openclaw-md ol {
        margin: 4px 0 6px 0;
        padding-left: 18px;
      }
      .openclaw-md li {
        margin-bottom: 2px;
      }
      .openclaw-stream-entry {
        border-left: 2px solid #2563eb;
        padding-left: 8px;
      }

      /* Task Input */
      .task-input-wrapper {
        padding: 12px;
        border-top: 2px solid var(--border);
        background: var(--panel-bg);
      }

      .task-input {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid var(--border);
        font-family: var(--font-mono);
        font-size: 13px;
        background: #ffffff;
        color: var(--text-main);
        outline: none;
      }

      .task-input::placeholder {
        color: var(--text-muted);
      }

      .task-input:focus {
        border-color: rgba(0, 0, 0, 0.35);
      }

      .openclaw-input-wrapper {
        padding: 10px 14px 12px;
        border-top: 1px solid var(--border);
        background: var(--panel-bg);
      }

      .openclaw-input-row {
        display: flex;
        gap: 8px;
      }

      .openclaw-task-input {
        flex: 1;
        padding: 9px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: var(--font-mono);
        font-size: 12px;
        background: #fff;
        color: var(--text-main);
        outline: none;
      }

      .openclaw-task-input:focus {
        border-color: rgba(0, 0, 0, 0.35);
      }

      .openclaw-submit {
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 6px;
        background: #fff;
        color: var(--text-main);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 0 12px;
        cursor: pointer;
      }

      .openclaw-submit:hover {
        background: rgba(0, 0, 0, 0.04);
      }

      /* Sign-in Modal */
      .auth-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      .auth-modal-overlay.open {
        opacity: 1;
        visibility: visible;
      }

      .auth-modal {
        position: relative;
        background: var(--panel-bg);
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 16px;
        padding: 0;
        width: 360px;
        max-width: calc(100vw - 32px);
        display: flex;
        flex-direction: column;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.04);
        overflow: hidden;
        transform: scale(0.96);
        transition: transform 0.2s ease;
      }

      .auth-modal-overlay.open .auth-modal {
        transform: scale(1);
      }

      .auth-modal-header {
        padding: 24px 24px 16px;
        text-align: center;
      }

      .auth-modal-logo {
        width: 48px;
        height: 48px;
        object-fit: contain;
        margin-bottom: 12px;
      }

      .auth-modal-title {
        font-family: var(--font-display);
        font-size: 20px;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 4px;
      }

      .auth-modal-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      .auth-modal-body {
        padding: 8px 24px 24px;
      }

      .auth-modal .auth-providers {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .auth-modal .auth-provider-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 14px 20px;
        font-family: var(--font-mono);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 10px;
        color: var(--text-main);
        transition: all 0.15s ease;
        background: white;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .auth-modal .auth-provider-btn:hover {
        background: rgba(0, 0, 0, 0.03);
        border-color: rgba(0, 0, 0, 0.2);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
      }

      .auth-modal .auth-provider-btn:active {
        transform: scale(0.99);
      }

      .auth-modal .auth-provider-btn:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .auth-modal .auth-provider-btn img {
        width: 22px;
        height: 22px;
        object-fit: contain;
        filter: invert(1);
      }

      .auth-modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.05);
        border: none;
        border-radius: 8px;
        color: var(--text-muted);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .auth-modal-close:hover {
        background: rgba(0, 0, 0, 0.08);
        color: var(--text-main);
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <header>
      <a href="/" class="navbar-brand">
        <img src="/assets/logo/lemona_pixel_logo.png" alt="Lemona" class="hero-logo" />
        <span class="brand-text">Lemona</span>
      </a>
      <div class="navbar-actions">
        <div class="navbar-links">
          <a href="https://github.com/BlackLotus0930/Lemona_World/tree/main/docs" class="nav-link" target="_blank" rel="noreferrer"><img src="/assets/icons/documentation_icon.png" alt="" class="nav-icon-doc" /> Documentation</a>
          <a href="https://github.com/BlackLotus0930/Lemona_World" class="nav-link" target="_blank" rel="noreferrer"><img src="/assets/icons/github_icon.png" alt="" class="nav-icon-github" /> Source</a>
        </div>
        <div id="auth-container"></div>
      </div>
    </header>

    <!-- Workspace -->
    <div class="workspace">
      <!-- Left Sidebar: -->
      <aside class="sidebar">
        <div class="panel-header">Characters</div>
        <div class="panel-content">
          <div class="agent-card">
            <div class="agent-avatar">I</div>
            <div class="agent-info">
              <h3>Iris</h3>
              <div class="agent-status"><span class="status-dot"></span> Idle</div>
            </div>
          </div>
          <div class="agent-card">
            <div class="agent-avatar">E</div>
            <div class="agent-info">
              <h3>Edward</h3>
              <div class="agent-status"><span class="status-dot busy"></span> Coding</div>
            </div>
          </div>
          <div class="agent-card">
            <div class="agent-avatar">M</div>
            <div class="agent-info">
              <h3>Momo</h3>
              <div class="agent-status"><span class="status-dot busy"></span> Web Search</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Game Canvas -->
      <main class="main-content">
        <div id="game-container"></div>
      </main>

      <!-- Right Sidebar: Activity Feed -->
      <aside class="sidebar right">
        <div class="right-panel-header">
          <div class="right-panel-title">Activity</div>
          <div class="right-panel-subtitle">What characters are saying and thinking</div>
          <div class="stream-switch">
            <button class="stream-tab active" data-stream="dialogues">Dialogue</button>
            <button class="stream-tab" data-stream="thoughts">Thoughts</button>
            <button class="stream-tab" data-stream="openclaw">Openclaw</button>
          </div>
        </div>
        <div class="panel-content log-panel">
          <div class="log-empty-state">
            <strong>Nothing yet</strong>
            Post a task and watch your agents come to life. Their dialogue and thoughts will appear here.
          </div>
        </div>
        <div class="openclaw-input-wrapper" style="display:none;">
          <div class="openclaw-input-row">
            <input
              class="openclaw-task-input"
              type="text"
              placeholder="Ask Openclaw to do something..."
            />
            <button class="openclaw-submit" type="button">Run</button>
          </div>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
